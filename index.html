<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>소중한 소식</title>

  <!-- 카톡 미리보기 -->
  <meta property="og:title" content="잠깐만 시간 괜찮아? 😊">
  <meta property="og:description" content="꼭 전하고 싶은 얘기가 있어요">
  <meta property="og:image" content="썸네일이미지URL">

  <style>
    body {
      margin: 0;
      font-family: 'Apple SD Gothic Neo', sans-serif;
    }

    /* 🔹 인트로 화면 */
    .intro {
      height: 100vh;
      background: #111; /* 👉 여기 색 바꾸면 분위기 바뀜 */
      color: white;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .intro h1 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    .intro p {
      font-size: 16px;
      opacity: 0.8;
    }

    /* 🔹 버튼 */
    button {
      margin-top: 30px;
      padding: 15px;
      width: 220px;
      font-size: 16px;
      background: #ff7a8a;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.96);
    }

    /* 🔹 본문 */
    .container {
      display: none;
      padding: 40px 20px;
      max-width: 500px;
      margin: 0 auto;
      text-align: center;
      background: linear-gradient(#fff5f7, #ffffff);
      min-height: 100vh;
      animation: fadeIn 1.5s;
    }

    .container h1 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    .message {
      margin-top: 20px;
      font-size: 18px;
      line-height: 1.6;
    }

    video, img {
      width: 100%;
      border-radius: 12px;
      margin-top: 15px;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(15px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>

<body>

  <!-- 🔥 인트로 -->
  <div id="intro" class="intro">
    <h1>잠깐만 시간 괜찮아?</h1>
    <p>우리 얘기 하나만 들어줄래 😊</p>
    <button onclick="reveal()">확인하기</button>
  </div>

  <!-- 🎉 공개 영역 -->
  <div id="content" class="container">
    <h1>👶 아기가 찾아왔어요!</h1>

    <p class="message">
      저희에게 정말 소중한 선물이 찾아왔습니다 💕<br>
      따뜻하게 지켜봐 주세요
    </p>

    <!-- 🎬 영상 -->
    <video controls playsinline>
      <source src="Secret_Video_d1gh86df2re8.mp4" type="video/mp4">
    </video>

    <!-- 🖼 사진 -->
    <img src="photo1.jpg">
    <img src="photo2.jpg">

    <p class="message">
      2026년, 우리에게 찾아온 기적 ✨
    </p>
  </div>

  <script>
    function reveal() {
      document.getElementById("intro").style.display = "none";

      const content = document.getElementById("content");
      content.style.display = "block";

      // 👇 자연스럽게 스크롤
      content.scrollIntoView({ behavior: "smooth" });
    }
  </script>

</body>
</html>
