<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta property="og:title" content="전해드릴 말씀이 있습니다">
  <meta property="og:description" content="잠시만 확인 부탁드립니다">

  <style>
    body {
      margin: 0;
      font-family: 'Apple SD Gothic Neo', sans-serif;
      background: #fff;
    }

    .intro {
      height: 100vh;
      background: linear-gradient(#fff1f3, #ffffff);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      transition: opacity 1s;
    }

    .intro.fade-out {
      opacity: 0;
    }

    button {
      margin-top: 30px;
      padding: 14px;
      width: 220px;
      font-size: 15px;
      background: #ff9aa2;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    .container {
      display: none;
      opacity: 0;
      padding: 40px 20px;
      max-width: 500px;
      margin: 0 auto;
      text-align: center;
      min-height: 100vh;
      transition: opacity 1.5s ease;
    }

    .container.show {
      opacity: 1;
    }

    /* 🔥 완전 숨김 상태 */
    .fade-item {
      opacity: 0;
      transform: translateY(15px);
      transition: all 1s;
      visibility: hidden;
    }

    /* 🔥 show 될 때만 보임 */
    .fade-item.show {
      opacity: 1;
      transform: translateY(0);
      visibility: visible;
    }

    /* 첫 등장 효과 */
    .fade-item.first.show {
      animation: pop 0.6s ease forwards, shake 0.5s 0.6s;
    }

    @keyframes pop {
      0% { transform: scale(0.7); opacity: 0; }
      80% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes shake {
      0% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-3px); }
      100% { transform: translateX(0); }
    }

    h1 {
      font-size: 24px;
      line-height: 1.4;
      word-break: keep-all;
    }

    .message {
      margin-top: 20px;
      font-size: 16px;
      line-height: 1.8;
      word-break: keep-all;
    }

    .last-question {
      font-size: 20px;
      line-height: 1.5;
      opacity: 0.9;
    }

    video {
      width: 100%;
      border-radius: 10px;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<audio id="bgm" loop>
  <source src="paulyudin-piano-piano-music-508963.mp3" type="audio/mpeg">
</audio>

<div id="intro" class="intro">
  <h1>
    전해드릴 말씀이<br>
    있습니다
  </h1>
  <p>
    잠시만 시간 내어<br>
    확인 부탁드립니다
  </p>
  <button onclick="reveal()">확인하기</button>
</div>

<div id="content" class="container">

  <h1 class="fade-item first">
    👶 까꿍!<br>
    할아버지 할머니 삼촌 이모 안녕하세요 😊<br><br>
  </h1>

  <p class="message fade-item">
    저는 까꿍이에요~<br>
    엄마 아빠에게 찾아온<br>
    소중한 아기예요<br>
  </p>

  <video id="mainVideo" class="fade-item" controls playsinline webkit-playsinline>
    <source src="Secret_Video_d1gh86df2re8.mp4" type="video/mp4">
  </video>

  <p class="message fade-item">
    저는 지금 열심히 자라고 있어요 🌱<br><br>
    쿵쾅쿵쾅 심자소리 잘 들리시나요??<br><br>
    건강하게 자라서 11월에 만나요.<br><br>
    조금만 기다려 주세요.❤️<br><br>
    보고싶어요~
  </p>

  <h1 class="fade-item last-question">
    저는 과연...<br>
    아들일까요? 딸일까요? 🤭
  </h1>

</div>

<script>
const bgm = document.getElementById("bgm");
const video = document.getElementById("mainVideo");

/* 🔥 BGM 페이드 인 */
function fadeInBgm() {
  bgm.volume = 0;
  bgm.play();

  let vol = 0;
  const interval = setInterval(() => {
    if (vol < 0.2) {
      vol += 0.02;
      bgm.volume = vol;
    } else {
      clearInterval(interval);
    }
  }, 200);
}

function reveal() {
  const intro = document.getElementById("intro");
  const content = document.getElementById("content");

  intro.classList.add("fade-out");

  setTimeout(() => {
    intro.style.display = "none";
    content.style.display = "block";

    setTimeout(() => {
      content.classList.add("show");
    }, 50);

    fadeInBgm();

    /* 🔥 순차 등장 */
    const items = document.querySelectorAll(".fade-item");

    let delay = 800;

    items.forEach((el) => {
      const extra = el.classList.contains("first") ? 1000 : 800;

      setTimeout(() => {
        el.classList.add("show");
      }, delay);

      delay += extra;
    });

  }, 1000);
}

/* 🎬 영상 재생 시 BGM 제거 */
video.addEventListener("play", () => {
  bgm.pause();
  bgm.currentTime = 0;
});

/* 영상 끝나면 */
video.addEventListener("ended", () => {
  fadeInBgm();
});

/* 중간 정지 대응 */
video.addEventListener("pause", () => {
  if (!video.ended) {
    fadeInBgm();
  }
});
</script>

</body>
</html>
