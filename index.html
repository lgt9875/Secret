<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta property="og:title" content="까꿍이가 인사드려요">
  <meta property="og:description" content="잠시만 확인해주세요 😊">

  <style>
    body {
      margin: 0;
      font-family: 'Apple SD Gothic Neo', sans-serif;
      background: #fff;
    }

    .intro {
      height: 100vh;
      background: linear-gradient(#fff1f3, #ffffff);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      transition: opacity 1s;
    }

    .intro.fade-out {
      opacity: 0;
    }

    button {
      margin-top: 30px;
      padding: 14px;
      width: 220px;
      font-size: 15px;
      background: #ff9aa2;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    .container {
      display: none;
      opacity: 0;
      padding: 40px 20px;
      max-width: 500px;
      margin: 0 auto;
      text-align: center;
      min-height: 100vh;
      transition: opacity 1.5s ease;
    }

    .container.show {
      opacity: 1;
    }

    .fade-item {
      opacity: 0;
      transform: translateY(15px);
      transition: all 1s;
    }

    .fade-item.show {
      opacity: 1;
      transform: translateY(0);
    }

    .fade-item.first.show {
      animation: pop 0.6s ease;
    }

    @keyframes pop {
      0% { transform: scale(0.7); opacity: 0; }
      80% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }

    h1 {
      font-size: 24px;
      line-height: 1.4;
      word-break: keep-all;
    }

    .message {
      margin-top: 20px;
      font-size: 16px;
      line-height: 1.8;
      word-break: keep-all;
    }

    video {
      width: 100%;
      border-radius: 10px;
      margin-top: 15px;
    }
  </style>
</head>

<body>

<audio id="bgm" loop>
  <source src="paulyudin-piano-piano-music-508963.mp3" type="audio/mpeg">
</audio>

<!-- 인트로 -->
<div id="intro" class="intro">
  <h1>
    까꿍이가<br>
    인사드려요 😊
  </h1>
  <p>
    잠시만 시간 내어<br>
    확인해주세요
  </p>
  <button onclick="reveal()">까꿍 👶</button>
</div>

<!-- 본문 -->
<div id="content" class="container">

  <!-- 1. 등장 -->
  <h1 class="fade-item first">
    👶 안녕하세요<br>
    저는 까꿍이에요
  </h1>

  <!-- 2. 인사 -->
  <p class="message fade-item">
    할아버지 할머니 안녕하세요<br><br>
    엄마 아빠에게 찾아온<br>
    소중한 아기예요 😊
  </p>

  <!-- 영상 -->
  <video id="mainVideo" class="fade-item" controls playsinline>
    <source src="Secret_Video_d1gh86df2re8.mp4" type="video/mp4">
  </video>

  <!-- 3. 만나는 시기 -->
  <p class="message fade-item">
    저는 지금 열심히 자라고 있어요 🌱<br><br>
    11월에 만나요 ❤️
  </p>

  <!-- 4. 떡밥 -->
  <h1 class="fade-item">
    저는 과연...<br>
    아들일까요? 딸일까요? 🤭
  </h1>

</div>

<script>
function reveal() {
  const intro = document.getElementById("intro");
  const content = document.getElementById("content");
  const bgm = document.getElementById("bgm");

  intro.classList.add("fade-out");

  setTimeout(() => {
    intro.style.display = "none";
    content.style.display = "block";

    setTimeout(() => {
      content.classList.add("show");
    }, 50);

    bgm.volume = 0.3;
    bgm.play();

    const items = document.querySelectorAll(".fade-item");

    items.forEach((el, index) => {
      const delay = el.classList.contains("first")
        ? 800
        : (index * 800) + 1200;

      setTimeout(() => {
        el.classList.add("show");
      }, delay);
    });

  }, 1000);
}
</script>

</body>
</html>
