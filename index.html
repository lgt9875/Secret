<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secret</title>

  <!-- 카톡 미리보기 -->
  <meta property="og:title" content="전해드릴 말씀이 있습니다">
  <meta property="og:description" content="잠시만 시간 내어 확인 부탁드립니다">
  <meta property="og:image" content="썸네일이미지URL">

  <style>
    body {
      margin: 0;
      font-family: 'Apple SD Gothic Neo', sans-serif;
    }

    /* 🔹 인트로 */
    .intro {
      height: 100vh;
      background: #ffffff;
      color: #333;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    .intro h1 {
      font-size: 22px;
      margin-bottom: 10px;
      font-weight: 500;
    }

    .intro p {
      font-size: 15px;
      color: #666;
    }

    button {
      margin-top: 30px;
      padding: 14px;
      width: 220px;
      font-size: 15px;
      background: #888;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    button:active {
      transform: scale(0.96);
    }

    /* 🔹 본문 */
    .container {
      display: none;
      padding: 40px 20px;
      max-width: 500px;
      margin: 0 auto;
      text-align: center;
      background: #ffffff;
      min-height: 100vh;
      animation: fadeIn 1.5s;
    }

    .container h1 {
      font-size: 24px;
      margin-bottom: 15px;
    }

    .message {
      margin-top: 20px;
      font-size: 17px;
      line-height: 1.7;
    }

    video, img {
      width: 100%;
      border-radius: 10px;
      margin-top: 15px;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(15px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>

<body>

  <!-- 🔹 인트로 -->
  <div id="intro" class="intro">
    <h1>전해드릴 말씀이 있습니다</h1>
    <p>잠시만 시간 내어 확인 부탁드립니다</p>
    <button onclick="reveal()">확인하기</button>
  </div>

  <!-- 🔹 공개 -->
  <div id="content" class="container">
    <h1>👶 새로운 가족이 찾아왔습니다</h1>

    <p class="message">
      저희에게 소중한 생명이 찾아왔습니다.<br>
      기쁜 마음으로 이 소식을 전해드립니다.<br><br>
      따뜻한 마음으로 지켜봐 주시면 감사하겠습니다.
    </p>

    <!-- 🎬 영상 -->
    <video controls playsinline>
      <source src="Secret_Video_d1gh86df2re8.mp4" type="video/mp4">
    </video>

    <!-- 🖼 사진 -->
    <img src="photo1.jpg">
    <img src="photo2.jpg">

    <p class="message">
      늘 건강하게 잘 준비하겠습니다 😊
    </p>
  </div>

  <script>
    function reveal() {
      document.getElementById("intro").style.display = "none";

      const content = document.getElementById("content");
      content.style.display = "block";
      content.scrollIntoView({ behavior: "smooth" });
    }
  </script>

</body>
</html>
