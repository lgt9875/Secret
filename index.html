<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>소중한 소식</title>

  <meta property="og:title" content="전해드릴 말씀이 있습니다">
  <meta property="og:description" content="잠시만 시간 내어 확인 부탁드립니다">

  <style>
    body {
      margin: 0;
      font-family: 'Apple SD Gothic Neo', sans-serif;
    }

    /* 🔹 인트로 */
    .intro {
      height: 100vh;
      background: linear-gradient(#fff1f3, #ffffff);
      color: #333;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      transition: opacity 1s;
    }

    .intro.fade-out {
      opacity: 0;
    }

    button {
      margin-top: 30px;
      padding: 14px;
      width: 220px;
      font-size: 15px;
      background: #ff7a8a;
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    /* 🔹 본문 */
    .container {
      display: none;
      padding: 40px 20px;
      max-width: 500px;
      margin: 0 auto;
      text-align: center;
      background: #ffffff;
      min-height: 100vh;
    }

    /* 👇 하나씩 등장 */
    .fade-item {
      opacity: 0;
      transform: translateY(15px);
      transition: all 1s;
    }

    .fade-item.show {
      opacity: 1;
      transform: translateY(0);
    }

    video, img {
      width: 100%;
      border-radius: 10px;
      margin-top: 15px;
    }

    .message {
      margin-top: 20px;
      font-size: 17px;
      line-height: 1.7;
    }
  </style>
</head>

<body>

  <!-- 🔹 인트로 -->
  <div id="intro" class="intro">
    <h1>전해드릴 말씀이 있습니다</h1>
    <p>잠시만 시간 내어 확인 부탁드립니다</p>
    <button onclick="reveal()">확인하기</button>
  </div>

  <!-- 🔹 본문 -->
  <div id="content" class="container">

    <h1 class="fade-item">👶 새로운 가족이 찾아왔습니다</h1>

    <p class="message fade-item">
      저희에게 소중한 생명이 찾아왔습니다.<br>
      기쁜 마음으로 이 소식을 전해드립니다.<br><br>
      따뜻한 마음으로 지켜봐 주시면 감사하겠습니다.
    </p>

    <video class="fade-item" controls playsinline>
      <source src="Secret_Video_d1gh86df2re8.mp4" type="video/mp4">
    </video>

    <img class="fade-item" src="photo1.jpg">
    <img class="fade-item" src="photo2.jpg">

    <p class="message fade-item">
      부족하지만 잘 준비하며 건강하게 지내겠습니다.<br>
      항상 감사드립니다.
    </p>

  </div>

  <script>
    function reveal() {
      const intro = document.getElementById("intro");
      const content = document.getElementById("content");

      // 👇 인트로 서서히 사라짐
      intro.classList.add("fade-out");

      setTimeout(() => {
        intro.style.display = "none";
        content.style.display = "block";

        // 👇 하나씩 등장
        const items = document.querySelectorAll(".fade-item");
        items.forEach((el, index) => {
          setTimeout(() => {
            el.classList.add("show");
          }, index * 800); // 순차 등장
        });

      }, 1000);
    }
  </script>

</body>
</html>
